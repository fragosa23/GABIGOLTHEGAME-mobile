<!DOCTYPE html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="screen-orientation" content="landscape" />
    <meta name="orientation" content="landscape" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <title>G. CALDEIRA 8 — Prologue</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0b1020;
        font-family: system-ui, sans-serif;
        touch-action: none;
        overscroll-behavior: none;
        user-select: none;
        -webkit-user-select: none;
        -webkit-text-size-adjust: 100%;
      }
      #app { width: 100vw; height: 100vh; display: block; }
      canvas { display: block; touch-action: none; }

      #mobileControls {
        position: fixed;
        inset: 0;
        z-index: 45;
        pointer-events: none;
        display: none;
        font-family: system-ui, sans-serif;
      }

      .mobile-controls-enabled #mobileControls {
        display: block;
      }

      .mobile-joy {
        position: absolute;
        left: max(18px, env(safe-area-inset-left));
        bottom: max(22px, env(safe-area-inset-bottom));
        width: 132px;
        height: 132px;
        border-radius: 50%;
        pointer-events: auto;
        touch-action: none;
        opacity: .56;
        background: radial-gradient(circle at 50% 50%, #ffffff10 0 34%, #06101d73 35% 100%);
        border: 2px solid #ffffff38;
        box-shadow: 0 10px 26px #0006, inset 0 0 20px #5fc7ff18;
      }

      .mobile-joy::before {
        content: "";
        position: absolute;
        inset: 18px;
        border: 1px solid #ffffff25;
        border-radius: inherit;
      }

      .mobile-joy-knob {
        position: absolute;
        left: 50%;
        top: 50%;
        width: 56px;
        height: 56px;
        border-radius: 50%;
        transform: translate(-50%, -50%);
        background: linear-gradient(180deg, #eaf8ffb8, #67c7ff91);
        border: 2px solid #ffffff88;
        box-shadow: 0 6px 14px #0006;
      }

      .mobile-joy.is-active {
        border-color: #8fe5ffcc;
        opacity: .78;
      }

      .mobile-actions {
        position: absolute;
        right: max(12px, env(safe-area-inset-right));
        bottom: max(12px, env(safe-area-inset-bottom));
        width: min(178px, 31vw);
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        grid-template-rows: repeat(2, auto);
        align-items: center;
        justify-items: center;
        gap: clamp(6px, 1.2vw, 10px);
        pointer-events: auto;
        touch-action: none;
      }

      .mobile-btn {
        width: clamp(52px, 8.4vw, 66px);
        height: clamp(52px, 8.4vw, 66px);
        aspect-ratio: 1;
        border: 2px solid #ffffff52;
        border-radius: 50%;
        color: #fff;
        opacity: .66;
        background:
          radial-gradient(circle at 35% 24%, #ffffff28, #ffffff00 28%),
          linear-gradient(180deg, #2b385a82, #11182b5f);
        box-shadow: 0 8px 18px #0005, inset 0 4px 12px #ffffff12, inset 0 -8px 14px #0005;
        font-size: clamp(9px, 1.6vw, 11px);
        font-weight: 900;
        letter-spacing: 0;
        text-shadow: 0 2px 4px #000b;
        touch-action: none;
      }

      .mobile-btn[data-action="run"] {
        grid-column: 2;
        grid-row: 1;
      }

      .mobile-btn[data-action="jump"] {
        grid-column: 1;
        grid-row: 2;
      }

      .mobile-btn[data-action="attack"] {
        grid-column: 2;
        grid-row: 2;
      }

      .mobile-btn-small {
        font-size: clamp(9px, 1.6vw, 11px);
      }

      .mobile-btn-kick {
        background:
          radial-gradient(circle at 35% 24%, #ffffff2d, #ffffff00 28%),
          linear-gradient(180deg, #ff7a4588, #c6282868);
      }

      .mobile-btn.is-active {
        border-color: #9dff6a;
        opacity: .82;
        background:
          radial-gradient(circle at 35% 24%, #ffffff4d, #ffffff00 28%),
          linear-gradient(180deg, #35ad5acf, #17672fac);
        box-shadow: 0 0 16px #6dff7b66, 0 8px 18px #0007;
        transform: translateY(2px) scale(.96);
      }

      .mobile-controls-enabled #hint {
        display: none !important;
      }

      .mobile-controls-enabled #msg {
        bottom: max(170px, calc(env(safe-area-inset-bottom) + 162px)) !important;
      }

      #portraitGuard {
        position: fixed;
        inset: 0;
        z-index: 100;
        display: none;
        align-items: center;
        justify-content: center;
        padding: 28px;
        text-align: center;
        color: #fff;
        background: #050913ee;
        font-size: 22px;
        font-weight: 900;
        line-height: 1.25;
      }

      @media (orientation: portrait) and (pointer: coarse) {
        #portraitGuard {
          display: flex;
        }
      }

      @media (orientation: portrait) {
        .mobile-joy {
          width: 118px;
          height: 118px;
        }

        .mobile-actions {
          width: min(160px, 45vw);
        }

        .mobile-btn {
          width: clamp(50px, 13vw, 62px);
          height: clamp(50px, 13vw, 62px);
        }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="portraitGuard">Roda o telemovel para horizontal</div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
